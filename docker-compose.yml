services:
  db:
    image: postgres:16-alpine
    container_name: news_db
    environment:
      POSTGRES_DB: lentadnya
      POSTGRES_USER: lentadnya
      POSTGRES_PASSWORD: lentadnya
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lentadnya -d lentadnya"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-seed:
    image: postgres:16-alpine
    container_name: news_db_seed
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: lentadnya
    volumes:
      - ./db/init/001_schema_seed.sql:/seed/001_schema_seed.sql:ro
    command: ["psql", "-h", "db", "-U", "lentadnya", "-d", "lentadnya", "-f", "/seed/001_schema_seed.sql"]
    restart: "no"

  app:
    build: .
    container_name: news_app
    depends_on:
      db-seed:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://lentadnya:lentadnya@db:5432/lentadnya
      SESSION_SECRET: super-secret-session-key
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  postgres_data:
