<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title or 'Лента Дня' }}</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260513-2" />
</head>
<body>
<header class="topbar">
  <a class="logo" href="/">Лента Дня</a>
  <form method="get" action="/" class="search">
    <input name="q" value="{{ q or '' }}" placeholder="Поиск новостей" />
    <button type="submit">Найти</button>
  </form>
  <nav>
    {% if current_user %}
      <span class="hello">{{ current_user.name }}</span>
      {% if current_user.role in ['admin', 'editor'] %}<a href="/admin">Панель</a>{% endif %}
      <form method="post" action="/auth/logout" data-method="delete"><button>Выйти</button></form>
    {% else %}
      <a href="/auth/login">Вход</a>
      <a href="/auth/register">Регистрация</a>
    {% endif %}
  </nav>
</header>
<main class="container">
  {% block content %}{% endblock %}
</main>
<script>
  document.addEventListener("submit", async (event) => {
    const form = event.target;
    if (!(form instanceof HTMLFormElement) || !form.dataset.method) {
      return;
    }

    if (form.dataset.confirm && !window.confirm(form.dataset.confirm)) {
      return;
    }

    event.preventDefault();

    const submitter = event.submitter;
    if (submitter) {
      submitter.disabled = true;
    }

    try {
      const method = form.dataset.method.toUpperCase();
      const options = { method, credentials: "same-origin" };
      if (method !== "DELETE") {
        options.body = new FormData(form);
      }

      const response = await fetch(form.action, options);
      if (response.redirected) {
        window.location.assign(response.url);
        return;
      }
      if (response.ok) {
        window.location.reload();
        return;
      }

      document.open();
      document.write(await response.text());
      document.close();
    } finally {
      if (submitter) {
        submitter.disabled = false;
      }
    }
  });
</script>
</body>
</html>
